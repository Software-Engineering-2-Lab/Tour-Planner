services:
  # Postgres SQL Database
  db:
    image: postgres:15
    container_name: tour-planner-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tourplanner_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend Placeholder - Java Spring Boot 
  backend:
    build: ./backend
    container_name: tour-planner-be
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - ./user_images:/app/images # Image mapping for user-uploaded images
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password

  # Frontend Placeholder - Angular 
  frontend:
    build: ./frontend
    container_name: tour-planner-fe
    ports:
      - "4200:4200"

volumes:
  postgres_data: